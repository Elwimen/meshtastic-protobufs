name: Sync with upstream

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/meshtastic/protobufs.git
          git fetch upstream

      - name: Rebase master onto upstream/master
        id: rebase
        continue-on-error: true
        run: git rebase upstream/master

      - name: Push
        if: steps.rebase.outcome == 'success'
        run: git push origin master --force-with-lease

      - name: Open issue on conflict
        if: steps.rebase.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Upstream sync conflict — manual rebase needed',
                body: 'Automatic rebase of `master` onto `upstream/master` failed.\n\nRun locally:\n```bash\ngit fetch upstream\ngit rebase upstream/master\n# resolve conflicts\ngit push fork master --force-with-lease\n```',
                labels: ['sync-conflict']
              });
            }
